name: Release Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify manifest version matches tag
        run: |
          manifest_version=$(jq -r '.version' plugin.json)
          if [ "$manifest_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Tag version (${{ steps.version.outputs.version }}) does not match plugin.json version ($manifest_version)"
            exit 1
          fi

      - name: Validate plugin.json
        run: |
          jq empty plugin.json
          echo "plugin.json is valid JSON"

      - name: Package plugin
        run: |
          PLUGIN_ID=$(jq -r '.id' plugin.json)
          WORK_DIR=$(mktemp -d)
          mkdir -p "$WORK_DIR/$PLUGIN_ID"
          cp Plugin.php plugin.json README.md "$WORK_DIR/$PLUGIN_ID/"
          cd "$WORK_DIR"
          zip -r "$PLUGIN_ID.zip" "$PLUGIN_ID/"
          sha256sum "$PLUGIN_ID.zip" | awk '{print $1}' > "$PLUGIN_ID.zip.sha256"
          mv "$PLUGIN_ID.zip" "$PLUGIN_ID.zip.sha256" "$GITHUB_WORKSPACE/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            epg-enricher.zip
            epg-enricher.zip.sha256
